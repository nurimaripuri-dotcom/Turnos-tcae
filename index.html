<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>TCAES 3ºC</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --I:#c0392b; --Ib:#fde8e8; --Ix:#c0392b;
  --V:#1e8449; --Vb:#d5f5e3; --Vx:#1e8449;
  --N2:#34495e; --N2b:#eaecee; --N2x:#34495e;
  --A:#1565c0; --Ab:#d6eaf8; --Ax:#1565c0;
  --bd:#dee2e6; --bg:#f8f9fa; --s1:#fff; --s2:#f0f2f5;
  --tx:#1a1a2e; --mu:#6c757d;
  --today:#1b5e20; --today-bg:#4caf50;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:"DM Mono",monospace;display:flex;flex-direction:column}
header{background:var(--s1);border-bottom:1px solid var(--bd);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;flex-shrink:0}
h1{font-family:"Syne",sans-serif;font-size:1rem;font-weight:800}
h1 em{color:var(--I);font-style:normal}
.hbtn{padding:5px 12px;border-radius:7px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);cursor:pointer;font-family:"DM Mono",monospace;font-size:.78rem}
.hbtn.primary{background:#c62828;color:#fff;border-color:#c62828}
.hbtn.edit-on{background:#2e7d32;color:#fff;border-color:#2e7d32}
.legend{display:flex;gap:5px;flex-wrap:wrap;padding:7px 16px;background:var(--s1);border-bottom:1px solid var(--bd);font-size:.68rem;flex-shrink:0}
.lc{padding:2px 7px;border-radius:4px;font-weight:500;border:1.5px solid}
.lc.I{background:var(--Ib);color:var(--I);border-color:var(--Ix)}
.lc.V{background:var(--Vb);color:var(--V);border-color:var(--Vx)}
.lc.N2{background:var(--N2b);color:var(--N2);border-color:var(--N2x)}
.lc.A{background:var(--Ab);color:var(--A);border-color:var(--Ax)}
.lc.neu{background:#f8f9fa;color:#6c757d;border-color:#dee2e6}
.wrap{flex:1;overflow:auto;min-height:0}
table{border-collapse:collapse;height:100%}
thead th{padding:4px 2px;font-size:.65rem;font-weight:600;color:var(--mu);text-align:center;white-space:nowrap;background:var(--s1);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:3}
th.name-col{text-align:left;padding-left:8px;min-width:82px;width:82px;left:0;z-index:4;border-right:1px solid var(--bd)}
th.month-hdr{background:var(--s2);color:var(--tx);font-family:"Syne",sans-serif;font-size:.72rem;border-right:2px solid var(--bd);border-bottom:2px solid var(--bd);letter-spacing:10px;text-transform:uppercase}
th.sun{background:#ede7f6}
th.we{color:#6f42c1}
th.today-hdr{background:var(--today)!important;color:#fff!important;font-weight:700}
tbody tr{border-bottom:1px solid var(--bd)}
td{padding:2px 1px;text-align:center;vertical-align:middle}
td.name-col{text-align:left;padding-left:8px;font-size:.75rem;font-weight:600;white-space:nowrap;position:sticky;left:0;background:var(--bg);z-index:1;border-right:1px solid var(--bd)}
td.sun{background:#f3e5f5}
td.today-col{background:var(--today-bg)!important}
.chip{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:6px;font-size:.8rem;font-weight:700;cursor:pointer;border:1.5px solid transparent;position:relative}
.chip.I{background:var(--Ib);color:var(--I);border-color:var(--Ix)}
.chip.V{background:var(--Vb);color:var(--V);border-color:var(--Vx)}
.chip.N2{background:var(--N2b);color:var(--N2);border-color:var(--N2x)}
.chip.A{background:var(--Ab);color:var(--A);border-color:var(--Ax)}
.chip.neu{background:#ffffff;color:#333333;border-color:#333333;border-width:2px}
.chip.vac{background:#fff3cd;color:#856404;border-color:#ffc107}
.chip.ld{background:#d1ecf1;color:#0c5460;border-color:#bee5eb}
.mi-chip.neu{background:#ffffff;color:#333333;border:2px solid #333333}
.mi-chip.vac{background:#fff3cd;color:#856404;border-color:#ffc107}
.mi-chip.ld{background:#d1ecf1;color:#0c5460;border-color:#bee5eb}
.chip.locked{cursor:default}
.change-dot{position:absolute;top:-4px;right:-4px;width:13px;height:13px;background:#ffc107;border-radius:50%;border:1.5px solid #fff;font-size:.5rem;display:flex;align-items:center;justify-content:center;color:#000;font-weight:700;cursor:pointer;z-index:2}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--s1);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:480px;transform:translateY(20px);transition:transform .2s;max-height:85vh;overflow-y:auto}
.overlay.open .modal{transform:translateY(0)}
.modal h2{font-family:"Syne",sans-serif;font-size:.95rem;margin-bottom:3px}
.msub{font-size:.72rem;color:var(--mu);margin-bottom:12px}
.slabel{font-size:.73rem;color:var(--mu);margin-bottom:6px;margin-top:8px}
.turn-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px}
.tbtn{padding:8px 10px;border-radius:7px;border:1.5px solid var(--bd);background:var(--s2);color:var(--tx);cursor:pointer;font-size:.78rem;font-weight:500}
.tbtn.active{border-color:var(--I);color:var(--I);background:var(--Ib)}
.unit-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:4px}
.ubtn{padding:9px 4px;border-radius:7px;border:1.5px solid;cursor:pointer;font-size:.74rem;font-weight:600;text-align:center;opacity:.45;transition:opacity .15s}
.ubtn.active{opacity:1}
.ubtn.I{background:var(--Ib);color:var(--I);border-color:var(--Ix)}
.ubtn.V{background:var(--Vb);color:var(--V);border-color:var(--Vx)}
.ubtn.N2{background:var(--N2b);color:var(--N2);border-color:var(--N2x)}
.ubtn.A{background:var(--Ab);color:var(--A);border-color:var(--Ax)}
input[type=text]{width:100%;padding:8px 10px;border-radius:7px;border:1px solid var(--bd);font-size:.82rem;font-family:"DM Mono",monospace;background:var(--s2);color:var(--tx);outline:none;margin-top:2px}
.mfooter{display:flex;justify-content:space-between;gap:8px;margin-top:14px}
.mbtn{padding:9px 16px;border-radius:8px;border:none;cursor:pointer;font-size:.82rem;font-weight:500;font-family:"DM Mono",monospace}
.mbtn-ghost{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}
.mbtn-save{background:var(--I);color:#fff}
.mbtn-del{background:#fde8e8;color:var(--I);border:1px solid var(--Ix)}
/* Name screen */
#nameScreen{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;align-items:center;justify-content:center}
.name-card{background:var(--s1);border-radius:16px;padding:28px;width:90%;max-width:340px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.name-card h2{font-family:"Syne",sans-serif;font-size:1.1rem;margin-bottom:8px}
.name-card p{font-size:.78rem;color:var(--mu);margin-bottom:18px}
.name-btns{display:flex;flex-direction:column;gap:8px;margin-top:14px}
/* Change log popup */
.log-popup{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:12px 18px;border-radius:10px;font-size:.75rem;z-index:500;max-width:320px;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,.3)}
.tab-btn{flex:1;padding:10px;border:none;background:transparent;font-family:"DM Mono",monospace;font-size:.82rem;cursor:pointer;color:var(--mu);border-bottom:3px solid transparent;transition:all .15s}
.tab-btn.active{color:var(--I);border-bottom-color:var(--I);font-weight:600}
.mi-day{display:flex;align-items:center;padding:10px 14px;border-radius:10px;margin-bottom:6px;gap:12px;border:1.5px solid var(--bd)}
.mi-day.today{border-color:var(--I);background:#fff9f9}
.mi-day-num{font-size:1.1rem;font-weight:700;min-width:32px;text-align:center}
.mi-day-name{font-size:.72rem;color:var(--mu)}
.mi-chip{padding:5px 14px;border-radius:7px;font-size:.85rem;font-weight:700}
.mi-chip.I{background:var(--Ib);color:var(--I);border:1.5px solid var(--Ix)}
.mi-chip.V{background:var(--Vb);color:var(--V);border:1.5px solid var(--Vx)}
.mi-chip.N2{background:var(--N2b);color:var(--N2);border:1.5px solid var(--N2x)}
.mi-chip.A{background:var(--Ab);color:var(--A);border:1.5px solid var(--Ax)}
.mi-chip.neu{background:var(--neub);color:var(--mu);border:1.5px solid var(--bd)}
.mi-month-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.mi-month-nav button{padding:5px 12px;border-radius:7px;border:1px solid var(--bd);background:var(--s2);cursor:pointer;font-size:.8rem}
.mi-month-nav span{font-family:"Syne",sans-serif;font-weight:700;font-size:.95rem}
</style>
</head>
<body>

<!-- NAME SCREEN -->
<div id="nameScreen">
  <div class="name-card">
    <h2>🏥 TCAES 3ºC</h2>
    <p>¿Cuál es tu nombre? Se usará para identificarte al hacer cambios.</p>
    <!-- STEP 1: Name -->
    <div id="stepName">
      <input type="text" id="nameInput" placeholder="Escribe tu nombre..." autofocus>
      <div id="nameError" style="display:none;color:var(--I);font-size:.72rem;margin-top:8px;text-align:left;line-height:1.4"></div>
      <button class="mbtn mbtn-save" onclick="saveName()" style="width:100%;margin-top:12px">Siguiente →</button>
    </div>
    <!-- STEP 2: PIN -->
    <div id="stepPin" style="display:none">
      <p style="font-size:.78rem;color:var(--mu);margin-bottom:10px" id="pinLabel">Introduce tu PIN (por defecto 0000):</p>
      <input type="password" id="pinInput" placeholder="····" maxlength="4" style="text-align:center;font-size:1.5rem;letter-spacing:8px;width:100%;padding:8px;border-radius:7px;border:1px solid var(--bd);background:var(--s2)">
      <div id="pinError" style="display:none;color:var(--I);font-size:.72rem;margin-top:8px;text-align:left"></div>
      <button class="mbtn mbtn-save" onclick="checkPin()" style="width:100%;margin-top:12px">Entrar</button>
      <button class="mbtn mbtn-ghost" onclick="document.getElementById('stepPin').style.display='none';document.getElementById('stepName').style.display='block'" style="width:100%;margin-top:8px;border:1px solid var(--bd)">← Volver</button>
    </div>
  </div>
</div>

<header>
  <h1>🏥 TCAES <em>3ºC</em></h1>
  <div style="display:flex;gap:6px;align-items:center">
    <button class="hbtn" onclick="changeYear(-1)">‹</button>
    <span id="yearLabel" style="font-family:Syne,sans-serif;font-weight:700;min-width:46px;text-align:center"></span>
    <button class="hbtn" onclick="changeYear(1)">›</button>
    <button class="hbtn primary" onclick="goToToday()">📍 Hoy</button>

  </div>
</header>
<div class="legend">
  <span style="color:var(--mu)">Unidad →</span>
  <div class="lc I">🔴 Ictus</div>
  <div class="lc V">🟢 351-353</div>
  <div class="lc N2">⚫ 354/337-339</div>
  <div class="lc A">🔵 340-345</div>
  <div class="lc neu">L · /</div>
  <div class="lc" style="background:#fff3cd;color:#856404;border-color:#ffc107">🏖 Vac</div>
  <div class="lc" style="background:#d1ecf1;color:#0c5460;border-color:#bee5eb">📋 LD</div>
  <span style="font-size:.65rem;color:var(--mu)">← desliza →</span>
</div>
<div style="display:flex;border-bottom:2px solid var(--bd);background:var(--s1);flex-shrink:0">
  <button class="tab-btn active" id="tab-mi" onclick="showTab('mi')">👤 Mi turno</button>
  <button class="tab-btn" id="tab-todos" onclick="showTab('todos')">📅 Todos</button>
</div>

<!-- MI TURNO VIEW -->
<div id="view-mi" style="flex:1;overflow:auto;padding:14px 16px">
  <div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:10px">
    <button onclick="changePin()" style="padding:6px 14px;border-radius:8px;border:1px solid var(--bd);background:var(--s2);color:var(--mu);cursor:pointer;font-size:.8rem;font-family:'DM Mono',monospace">🔑 PIN</button>
    <button id="miEditBtn" onclick="toggleMiEdit()" style="padding:6px 14px;border-radius:8px;border:1px solid #dee2e6;background:#fff3cd;color:#856404;cursor:pointer;font-size:.8rem;font-family:'DM Mono',monospace">🔒 Editar mi turno</button>
  </div>
  <div id="miTurnoContent"></div>
</div>

<!-- TODOS VIEW -->
<div id="view-todos" style="flex:1;overflow:auto;display:none">
<div class="wrap" id="wrap">
  <table id="tbl" style="border-collapse:collapse;width:max-content">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
</div><!-- end view-todos -->

<!-- EDIT MODAL -->
<div class="overlay" id="overlay" onclick="outsideClose(event)">
  <div class="modal">
    <h2 id="mTitle">Editar</h2>
    <div class="msub" id="mSub"></div>
    <div class="slabel">Turno:</div>
    <div class="turn-row" id="turnRow"></div>
    <div id="unitSection">
      <div class="slabel" id="unitLabel1">Unidad:</div>
      <div class="unit-grid" id="unitGrid1"></div>
      <div class="slabel" id="unitLabel2" style="display:none">Segunda unidad:</div>
      <div class="unit-grid" id="unitGrid2" style="display:none"></div>
    </div>
    <div class="slabel">Tu nombre:</div>
    <input type="text" id="inputWho" placeholder="Tu nombre...">
    <div class="slabel">Cambio con:</div>
    <input type="text" id="inputWith" placeholder="Nombre de la compañera...">
    <div class="slabel">Comentario (opcional):</div>
    <input type="text" id="inputComment" placeholder="Ej: me cubre ella el día 20...">
    <div class="mfooter">
      <button class="mbtn mbtn-del" onclick="applyEdit(null,null,null)">✕ Borrar</button>
      <div style="display:flex;gap:8px">
        <button class="mbtn mbtn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="mbtn mbtn-save" onclick="confirmEdit()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<!-- CHANGE LOG POPUP -->
<div class="log-popup" id="logPopup" style="display:none"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const ROTA = [
  [["T","V"],["T","I"],["N","I"],["/",null],["L",null],["L",null],["M","I"]],
  [["M","N2"],["M","N2"],["T","A"],["N","N2"],["/",null],["L",null],["L",null]],
  [["L",null],["M","A"],["M","A"],["T","A"],["N","N2"],["/",null],["L",null]],
  [["L",null],["L",null],["T","I"],["N","I"],["/",null],["L",null],["L",null]],
  [["M","I"],["M","I"],["M","I"],["T","I"],["N","I"],["/",null],["L",null]],
  [["L",null],["M","V"],["M","V"],["T","V"],["T","V"],["N","N2"],["/",null]],
  [["L",null],["L",null],["M","N2"],["M","V"],["T","I"],["T","I"],["N","N2"]],
  [["/",null],["L",null],["L",null],["M","N2"],["M","N2"],["T","V"],["T","V"]],
  [["N","I"],["/",null],["L",null],["M","I"],["M","I"],["M","I"],["T","I"]],
  [["T","I"],["N","I"],["/",null],["L",null],["L",null],["M","N2"],["M","N2"]],
  [["M","A"],["T","A"],["N","N2"],["/",null],["L",null],["L",null],["L",null]],
  [["M","V"],["T","V"],["T","V"],["L",null],["M","A"],["M","A"],["M","A"]],
  [["L",null],["L",null],["L",null],["M","A"],["T","A"],["T","A"],["T","A"]],
  [["N","N2"],["/",null],["L",null],["L",null],["M","V"],["M","V"],["M","V"]],
  [["T","A"],["N","N2"],["/",null],["L",null],["L",null],["L",null],["L",null]],
];
const PEOPLE = [
  {name:"Montse",startRow:1},
  {name:"Manuela",startRow:2},
  {name:"Ana",startRow:3},
  {name:"Alberto",startRow:4},
  {name:"Cristina",startRow:5},
  {name:"Diana",startRow:6},
  {name:"Patricia",startRow:7},
  {name:"Loly",startRow:8},
  {name:"Josefa",startRow:9},
  {name:"Ana Irib.",startRow:10},
  {name:"Vanesa F.",startRow:11},
  {name:"Manuel",startRow:12},
  {name:"Isabel",startRow:13},
  {name:"Adrián",startRow:14},
  {name:"Vanesa",startRow:15},
];

const MONTHS_ES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DAYS_ES=["L","M","X","J","V","S","D"];
const REF_MONDAY=new Date(2026,3,6);
const UNITS=[["I","🔴 Ictus"],["V","🟢 351-353"],["N2","⚫ 354/337-339"],["A","🔵 340-345"]];
const TURNS=[["M","☀️ M"],["T","🌤 T"],["N","🌙 N"],["MT","☀️🌤 M/T"],["TN","🌤🌙 T/N"],["L","✅ L"],["/","/ Sal"],["V","🏖 Vac"],["LD","📋 LD"]];

let currentYear=new Date().getFullYear();
let editMode=false;
let miEditMode=false;
let miMonth=new Date().getMonth();
let miYear=new Date().getFullYear();
let userName=localStorage.getItem("tcaes_user")||"";
let userRow=parseInt(localStorage.getItem("tcaes_row")||"0"); // 0=admin/unknown, 1-15=person row // 0=admin
let editCtx=null,editTurn=null,editUnit=null,editUnit2=null;
let changeLogData={};
let changeIcons={};
window.dateOverrides={}; // {pi_YYYYMMDD: cellValue}
let db=null;

// Name screen
function saveName(){
  const n=document.getElementById("nameInput").value.trim();
  if(!n) return;
  userName=n;
  localStorage.setItem("tcaes_user",n);
  // Find exact matching row
  const nl=n.toLowerCase();
  const idx=PEOPLE.findIndex(p=>p.name.toLowerCase()===nl);
  if(idx<0){
    const nameList = PEOPLE.map(p=>p.name).join(", ");
    document.getElementById("nameError").textContent="❌ Nombre no encontrado. Nombres válidos: "+nameList;
    document.getElementById("nameError").style.display="block";
    return;
  }
  document.getElementById("nameError").style.display="none";
  userRow=idx+1;
  localStorage.setItem("tcaes_row",String(userRow));
  // Go to PIN step
  document.getElementById("stepName").style.display="none";
  document.getElementById("stepPin").style.display="block";
  document.getElementById("pinInput").value="";
  document.getElementById("pinError").style.display="none";
  document.getElementById("pinInput").focus();
}
document.getElementById("nameInput").addEventListener("keydown",e=>{if(e.key==="Enter")saveName();});
document.addEventListener("DOMContentLoaded",()=>{
  const pi=document.getElementById("pinInput");
  if(pi) pi.addEventListener("keydown",e=>{if(e.key==="Enter")checkPin();});
});


function checkPin(){
  const pin=document.getElementById("pinInput").value.trim();
  if(pin.length!==4||!/^[0-9]{4}$/.test(pin)){
    document.getElementById("pinError").textContent="❌ El PIN debe ser 4 números";
    document.getElementById("pinError").style.display="block";
    return;
  }
  if(db){
    db.ref("tcaes_pins/"+userRow).once("value").then(snap=>{
      const stored=snap.val()||"0000";
      if(pin===stored){
        enterApp();
      } else {
        document.getElementById("pinError").textContent="❌ PIN incorrecto";
        document.getElementById("pinError").style.display="block";
        document.getElementById("pinInput").value="";
      }
    }).catch(()=>enterApp());
  } else {
    const stored=localStorage.getItem("tcaes_pin_"+userRow)||"0000";
    if(pin===stored){enterApp();}
    else {
      document.getElementById("pinError").textContent="❌ PIN incorrecto";
      document.getElementById("pinError").style.display="block";
      document.getElementById("pinInput").value="";
    }
  }
}

function enterApp(){
  localStorage.setItem("tcaes_verified_"+userRow,"1");
  document.getElementById("nameScreen").style.display="none";
  initApp();
  setTimeout(()=>{renderMiTurno();showTab("mi");},500);
}

function changePin(){
  const oldPin=prompt("PIN actual:");
  if(!oldPin) return;
  if(db){
    db.ref("tcaes_pins/"+userRow).once("value").then(snap=>{
      const stored=snap.val()||"0000";
      if(oldPin!==stored){alert("PIN incorrecto");return;}
      const newPin=prompt("Nuevo PIN (4 números):");
      if(!newPin||!/^[0-9]{4}$/.test(newPin)){alert("El PIN debe ser 4 números");return;}
      const confirm2=prompt("Repite el nuevo PIN:");
      if(newPin!==confirm2){alert("Los PINes no coinciden");return;}
      db.ref("tcaes_pins/"+userRow).set(newPin).then(()=>alert("✅ PIN cambiado correctamente"));
    });
  }
}

function fixErrors(){
  if(!db) return;
  db.ref("fixes/fix_cleanup_v3").once("value").then(snap=>{
    if(snap.val()) return;
    // Borrar todos los cambios y el log completamente
    db.ref("rota_changes").remove();
    db.ref("change_log").remove();
    db.ref("fixes/fix_cleanup_v3").set(true);
    console.log("Limpieza total aplicada");
  });
}

function mondayOf(d){const dt=new Date(d);const day=dt.getDay();dt.setDate(dt.getDate()+(day===0?-6:1-day));return dt;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function weekOff(mon){return Math.round((mon-REF_MONDAY)/(7*86400000));}
function rowFor(sr,mon){const o=weekOff(mon);return((sr-1+o)%15+15)%15;}

function chipCls(t,u){
  if(!t||t==="L"||t==="/"||t==="MT"||t==="TN")return"neu";
  if(t==="V")return"vac";
  if(t==="LD")return"ld";
  return u||"neu";
}

function render(){
  document.getElementById("yearLabel").textContent=currentYear;
  const today=new Date();

  const dayCols=[];
  for(let m=0;m<12;m++){
    const last=new Date(currentYear,m+1,0).getDate();
    for(let d=1;d<=last;d++){
      const date=new Date(currentYear,m,d);
      const dow=(date.getDay()+6)%7;
      dayCols.push({yr:currentYear,mn:m,d,dow,isSun:dow===6,isWE:dow>=5,isToday:date.toDateString()===today.toDateString()});
    }
  }

  // Month header
  let h1='<tr><th class="name-col" rowspan="2" style="position:sticky;left:0;top:0;z-index:5">Nombre</th>';
  let prev=-1,span=0;
  dayCols.forEach((dc,i)=>{
    if(dc.mn!==prev){if(span>0)h1+=`<th class="month-hdr" colspan="${span}">${MONTHS_ES[dayCols[i-span].mn]}</th>`;span=0;prev=dc.mn;}
    span++;
    if(i===dayCols.length-1)h1+=`<th class="month-hdr" colspan="${span}">${MONTHS_ES[dc.mn]}</th>`;
  });
  h1+='</tr>';

  // Day numbers
  let h2='<tr>';
  dayCols.forEach(dc=>{
    const cls=(dc.isToday?"today-hdr ":"")+(dc.isSun?"sun ":dc.isWE?"we ":"");
    h2+=`<th class="${cls}" style="min-width:40px;width:40px">${dc.d}<br><span style="font-size:.56rem">${DAYS_ES[dc.dow]}</span></th>`;
  });
  h2+='</tr>';
  document.getElementById("thead").innerHTML=h1+h2;

  // Body
  let body='';
  PEOPLE.forEach((p,pi)=>{
    const isMyRow=(userRow===pi+1);
    const bg=pi%2===0?"#fff":"#f8f9fa";
    body+=`<tr><td class="name-col" style="background:${bg};${isMyRow?"font-weight:700;color:var(--I)":""}">${p.name}</td>`;
    dayCols.forEach(dc=>{
      const mon=mondayOf(new Date(dc.yr,dc.mn,dc.d));
      const ri=rowFor(p.startRow,mon);
      const dateStr2=dc.yr+String(dc.mn+1).padStart(2,"0")+String(dc.d).padStart(2,"0");
      const overrideKey=pi+"_"+dateStr2;
      const cell=window.dateOverrides[overrideKey]!==undefined?window.dateOverrides[overrideKey]:ROTA[ri][dc.dow];
      const t=cell?cell[0]:null,u=cell?cell[1]:null;
      const cls=chipCls(t,u);
      const u2=cell?cell[2]:null;
      const UCOL={I:"#c0392b",V:"#1e8449",N2:"#34495e",A:"#1565c0"};
      let lbl,sz;
      if(t==="MT"||t==="TN"){
        const c1=UCOL[u]||"#888", c2=UCOL[u2]||"#888";
        const l1=t==="MT"?"M":"T", l2=t==="MT"?"T":"N";
        lbl=`<span style="color:${c1};font-size:.65rem;font-weight:800">${l1}</span><span style="color:#aaa;font-size:.55rem">/</span><span style="color:${c2};font-size:.65rem;font-weight:800">${l2}</span>`;
        sz=".65rem";
      } else if(t==="V"){lbl="🏖";sz=".75rem";}
      else if(t==="LD"){lbl="LD";sz=".65rem";}
      else {
        lbl=t||"·";
        sz=".8rem";
      }
      const cellBg=dc.isToday?"#4caf50":dc.isSun?"#f3e5f5":bg;
      // Change log dot
      const dateStr=dc.yr+String(dc.mn+1).padStart(2,"0")+String(dc.d).padStart(2,"0");
      const iconData=changeIcons[pi]&&changeIcons[pi][dateStr];
      const hasLog=!!iconData;
      const dot=hasLog?`<span class="change-dot" onclick="showLog(event,${pi},'${dateStr}')">✎</span>`:"";
      // Editable only if editMode AND (my row OR admin)
      const canEdit=false; // editing only in Mi turno tab
      const dateKey=dc.yr+"_"+(dc.mn+1)+"_"+dc.d;
      body+=`<td class="${dc.isToday?"today-col":dc.isSun?"sun":""}" style="background:${cellBg}!important">
        <div style="position:relative;display:inline-block">
          <div class="chip ${cls}${canEdit?"":" locked"}" style="font-size:${sz}" ${onclick?`onclick="${onclick}"`:""}>${lbl}</div>
          ${dot}
        </div>
      </td>`;
    });
    body+='</tr>';
  });
  document.getElementById("tbody").innerHTML=body;
  if(typeof renderMiTurno==="function") renderMiTurno();
}

function showMiLog(e,day){
  e.stopPropagation();
  const dateStr=miYear+String(miMonth+1).padStart(2,"0")+String(day).padStart(2,"0");
  const icon=changeIcons[userRow-1]&&changeIcons[userRow-1][dateStr];
  // Also look in changeLogData for comment
  const logKey=(userRow-1)+"_"+miYear+String(miMonth+1).padStart(2,"0")+String(day).padStart(2,"0");
  const logs=changeLogData[logKey];
  const last=logs&&logs.length>0?logs[logs.length-1]:null;
  if(!icon&&!last)return;
  const quien=last?last.quien:icon?icon.quien:"";
  const con=last?last.con:icon?icon.con:"";
  const comentario=last?last.comentario:"";
  const cambio=last?last.cambio:icon?icon.cambio:"";
  const popup=document.getElementById("logPopup");
  const txt=[
    quien?"👤 "+quien:"",
    con&&con!=="—"?"🔄 Con: "+con:"",
    comentario?"💬 "+comentario:"",
    cambio?"📋 "+cambio:""
  ].filter(Boolean).join("<br>");
  popup.innerHTML=txt;
  popup.style.display="block";
  setTimeout(()=>popup.style.display="none",6000);
}

function showLog(e,pi_,dateStr){
  e.stopPropagation();
  const data=changeIcons[pi_]&&changeIcons[pi_][dateStr];
  if(!data)return;
  const popup=document.getElementById("logPopup");
  popup.innerHTML=`✎ <b>${data.quien||"?"}</b> con <b>${data.con||"—"}</b><br>Cambio: ${data.cambio||""}`;
  popup.style.display="block";
  setTimeout(()=>popup.style.display="none",4000);
}

function applyEdit(t,u,u2){
  if(!editCtx)return;
  const val=t?[t,u||null,u2||null]:null;
  // Store as date override, not ROTA modification
  if(editCtx.dateKey){
    const ovKey=editCtx.dateKey; // already pi_YYYYMMDD
    window.dateOverrides[ovKey]=val;
  } else {
    ROTA[editCtx.ri][editCtx.di]=val;
  }
  const who=document.getElementById("inputWho")?document.getElementById("inputWho").value.trim()||userName:"sistema";
  const withWho=document.getElementById("inputWith")?document.getElementById("inputWith").value.trim()||"—":"—";
  if(who){userName=who;localStorage.setItem("tcaes_user",who);}
  if(db){
    if(editCtx.dateKey){
      db.ref("rota_changes/"+editCtx.dateKey).set(val).catch(()=>{});
    }
    const comment=document.getElementById("inputComment")?document.getElementById("inputComment").value.trim():"";
    if(editCtx.dateKey){
      db.ref("change_log").push({
        quien:who,con:withWho,
        comentario:comment||"",
        fecha:new Date().toLocaleString("es-ES"),
        fila:editCtx.ri+1,dia:DAYS_ES[editCtx.di],
        cambio:val?val[0]+(val[1]?" ("+val[1]+")":""):"Borrado",
        dateKey:editCtx.dateKey
      }).catch(()=>{});
      // Save icon marker: change_icons/pi/date
      const parts=editCtx.dateKey.split("_");
      const pi_=parts[0], date_=parts[1];
      if(val){
        db.ref("change_icons/"+pi_+"/"+date_).set({quien:who,con:withWho,cambio:val[0]}).catch(()=>{});
      } else {
        db.ref("change_icons/"+pi_+"/"+date_).remove().catch(()=>{});
      }
    }
  }
  closeModal();render();
}
