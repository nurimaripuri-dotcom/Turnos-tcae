<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCAES 3ºC</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f8f9fa; --s1:#ffffff; --s2:#f0f2f5; --bd:#dee2e6; --tx:#1a1a2e; --mu:#6c757d;
  --I:#c0392b; --Ib:#fde8e8; --Ix:#c0392b;
  --V:#1e8449; --Vb:#d5f5e3; --Vx:#1e8449;
  --N2:#34495e; --N2b:#eaecee; --N2x:#34495e;
  --A:#1a5276; --Ab:#d6eaf8; --Ax:#1a5276;
  --neu:#6c757d; --neub:#f8f9fa; --neubx:#6c757d;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:"DM Mono",monospace;min-height:100vh}
header{background:var(--s1);border-bottom:1px solid var(--bd);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100}
h1{font-family:"Syne",sans-serif;font-size:1.05rem;font-weight:800}
h1 em{color:var(--I);font-style:normal}
.hbtn{padding:6px 14px;border-radius:7px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);cursor:pointer;font-family:"DM Mono",monospace;font-size:.8rem}
.hbtn.primary{background:var(--I);color:#fff;border-color:var(--I)}
.legend{display:flex;gap:6px;flex-wrap:wrap;padding:10px 18px;background:var(--s1);border-bottom:1px solid var(--bd);font-size:.7rem}
.lc{padding:2px 8px;border-radius:4px;font-weight:500;border:1.5px solid}
.lc.I{background:var(--Ib);color:var(--I);border-color:var(--Ix)}
.lc.V{background:var(--Vb);color:var(--V);border-color:var(--Vx)}
.lc.N2{background:var(--N2b);color:var(--N2);border-color:var(--N2x)}
.lc.A{background:var(--Ab);color:var(--A);border-color:var(--Ax)}
.lc.neu{background:var(--neub);color:var(--neu);border-color:var(--neubx)}
.wrap{overflow-x:auto;flex:1}
table{border-collapse:collapse;table-layout:fixed}
thead tr{background:var(--s1);border-bottom:2px solid var(--bd)}
th{padding:6px 2px;font-size:.68rem;font-weight:600;color:var(--mu);text-align:center;white-space:nowrap}
th.name-col{text-align:left;padding-left:10px;min-width:90px;width:90px;position:sticky;left:0;background:var(--s1);z-index:2;border-right:1px solid var(--bd)}
th.month-hdr{background:var(--s2);color:var(--tx);font-family:"Syne",sans-serif;font-size:.75rem;font-weight:700;border-right:2px solid var(--bd)}
th.sun{background:#e8e0f5}
th.we{color:#6f42c1}
tbody tr{border-bottom:1px solid var(--bd)}
tbody tr:hover td{background:var(--s2)}
td{padding:2px 1px;text-align:center;border-bottom:1px solid var(--bd)}
td.name-col{text-align:left;padding-left:8px;font-size:.78rem;font-weight:600;white-space:nowrap;position:sticky;left:0;background:var(--bg);z-index:1;border-right:1px solid var(--bd)}
td.sun{background:#f0ecf8}
.chip{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:5px;font-size:.72rem;font-weight:700;cursor:pointer;border:1px solid transparent;transition:transform .1s}
.chip:hover{transform:scale(1.12)}
.chip.I{background:var(--Ib);color:var(--I);border-color:var(--Ix)}
.chip.V{background:var(--Vb);color:var(--V);border-color:var(--Vx)}
.chip.N2{background:var(--N2b);color:var(--N2);border-color:var(--N2x)}
.chip.A{background:var(--Ab);color:var(--A);border-color:var(--Ax)}
.chip.neu{background:var(--neub);color:var(--neu);border-color:var(--neubx)}
.chip.today-chip{outline:2px solid #1a7a40;outline-offset:1px}
.today-col{background:#e8f5e9!important}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:22px;width:94%;max-width:340px;transform:translateY(10px);transition:transform .2s}
.overlay.open .modal{transform:translateY(0)}
.modal h2{font-family:"Syne",sans-serif;font-size:.95rem;margin-bottom:4px}
.msub{font-size:.72rem;color:var(--mu);margin-bottom:14px}
.slabel{font-size:.74rem;color:var(--mu);margin-bottom:7px}
.turn-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tbtn{padding:7px 10px;border-radius:7px;border:1.5px solid var(--bd);background:var(--s2);color:var(--tx);cursor:pointer;font-size:.78rem;font-weight:500}
.tbtn.active{border-color:var(--I);color:var(--I);background:var(--Ib)}
.unit-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.ubtn{padding:9px 4px;border-radius:7px;border:1.5px solid;cursor:pointer;font-size:.75rem;font-weight:600;text-align:center;opacity:.5}
.ubtn.active{opacity:1}
.ubtn.I{background:var(--Ib);color:var(--I);border-color:var(--Ix)}
.ubtn.V{background:var(--Vb);color:var(--V);border-color:var(--Vx)}
.ubtn.N2{background:var(--N2b);color:var(--N2);border-color:var(--N2x)}
.ubtn.A{background:var(--Ab);color:var(--A);border-color:var(--Ax)}
.mfooter{display:flex;justify-content:space-between;gap:8px}
.mbtn{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:.8rem;font-weight:500}
.mbtn-ghost{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}
.mbtn-save{background:var(--I);color:#fff}
.mbtn-del{background:#fde8e8;color:var(--I);border:1px solid var(--Ix)}
</style>
</head>
<body>
<header>
  <h1>🏥 TCAES <em>3ºC</em></h1>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="hbtn" onclick="changeYear(-1)">‹</button>
    <span id="yearLabel" style="font-family:Syne,sans-serif;font-weight:700;min-width:50px;text-align:center"></span>
    <button class="hbtn" onclick="changeYear(1)">›</button>
    <button class="hbtn primary" onclick="goToToday()">📍 Hoy</button>
  </div>
</header>
<div class="legend">
  <span style="color:var(--mu);margin-right:4px">Unidad →</span>
  <div class="lc I">🔴 Ictus</div>
  <div class="lc V">🟢 351-353</div>
  <div class="lc N2">⚫ 354/337-339</div>
  <div class="lc A">🔵 340-345</div>
  <div class="lc neu">L libre · / sal.</div>
  <span style="font-size:.68rem;color:var(--mu)">← desliza →</span>
</div>
<div class="wrap" id="wrap">
  <table id="tbl">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="outsideClose(event)">
  <div class="modal">
    <h2 id="mTitle">Editar</h2>
    <div class="msub" id="mSub"></div>
    <div class="slabel">Turno:</div>
    <div class="turn-row" id="turnRow"></div>
    <div id="unitSection">
      <div class="slabel" id="unitLabel1">Unidad:</div>
      <div class="unit-grid" id="unitGrid1"></div>
      <div class="slabel" id="unitLabel2" style="display:none">Segunda unidad:</div>
      <div class="unit-grid" id="unitGrid2" style="display:none"></div>
    </div>
    <div class="mfooter">
      <button class="mbtn mbtn-del" onclick="applyEdit(null,null,null)">✕ Borrar</button>
      <div style="display:flex;gap:8px">
        <button class="mbtn mbtn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="mbtn mbtn-save" onclick="confirmEdit()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const ROTA = [
  [["T","V"],["T","I"],["N","I"],["/",null],["L",null],["L",null],["M","I"]],
  [["M","N2"],["M","N2"],["T","A"],["N","N2"],["/",null],["L",null],["L",null]],
  [["L",null],["M","A"],["M","A"],["T","A"],["N","N2"],["/",null],["L",null]],
  [["L",null],["L",null],["T","I"],["N","I"],["/",null],["L",null],["L",null]],
  [["M","I"],["M","I"],["M","I"],["T","I"],["N","I"],["/",null],["L",null]],
  [["L",null],["M","V"],["M","V"],["T","V"],["T","V"],["N","N2"],["/",null]],
  [["L",null],["L",null],["M","N2"],["M","V"],["T","I"],["T","I"],["N","N2"]],
  [["/",null],["L",null],["L",null],["M","N2"],["M","N2"],["T","V"],["T","V"]],
  [["N","I"],["/",null],["L",null],["M","I"],["M","I"],["M","I"],["T","I"]],
  [["T","I"],["N","I"],["/",null],["L",null],["L",null],["M","N2"],["M","N2"]],
  [["M","A"],["T","A"],["N","N2"],["/",null],["L",null],["L",null],["L",null]],
  [["M","V"],["T","V"],["T","V"],["L",null],["M","A"],["M","A"],["M","A"]],
  [["L",null],["L",null],["L",null],["M","A"],["T","A"],["T","A"],["T","A"]],
  [["N","N2"],["/",null],["L",null],["L",null],["M","V"],["M","V"],["M","V"]],
  [["T","A"],["N","N2"],["/",null],["L",null],["L",null],["L",null],["L",null]],
];
const PEOPLE = [
  {name:"Montse",startRow:1},
  {name:"Manuela",startRow:2},
  {name:"Ana",startRow:3},
  {name:"Alberto",startRow:4},
  {name:"Cristina",startRow:5},
  {name:"Diana",startRow:6},
  {name:"Laura",startRow:7},
  {name:"Loly",startRow:8},
  {name:"Josefa",startRow:9},
  {name:"Ana Irib.",startRow:10},
  {name:"Vanesa F.",startRow:11},
  {name:"Manuel",startRow:12},
  {name:"Isabel",startRow:13},
  {name:"Adrián",startRow:14},
  {name:"Vanesa",startRow:15},
];

const MONTHS_ES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DAYS_ES = ["L","M","X","J","V","S","D"];
const REF_MONDAY = new Date(2026,3,6);
const UNIT_LABELS = {I:"🔴 Ictus",V:"🟢 351-353",N2:"⚫ 354/337-339",A:"🔵 340-345"};

let currentYear = new Date().getFullYear();
let editCtx = null, editTurn = null, editUnit = null, editUnit2 = null;

// Firebase
let db = null;
try {
  const fc = {
    apiKey:"AIzaSyADK5CA7AZotGERWaU3Bpjym4vYLZm9grU",
    authDomain:"rotatorio-tcaes.firebaseapp.com",
    databaseURL:"https://rotatorio-tcaes-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:"rotatorio-tcaes",
    storageBucket:"rotatorio-tcaes.firebasestorage.app",
    messagingSenderId:"362053048865",
    appId:"1:362053048865:web:e77a2ba4d053c4f7b6a160"
  };
  firebase.initializeApp(fc);
  db = firebase.database();
  db.ref("rota_changes").on("value", snap => {
    const ch = snap.val();
    if(ch) Object.entries(ch).forEach(([k,v]) => {
      const [ri,di] = k.split("_").map(Number);
      ROTA[ri][di] = v;
    });
    render();
  });
} catch(e) { render(); }

function mondayOf(d) {
  const dt = new Date(d); const day = dt.getDay();
  dt.setDate(dt.getDate() + (day===0?-6:1-day)); return dt;
}
function addDays(d,n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function weekOff(mon) { return Math.round((mon-REF_MONDAY)/(7*86400000)); }
function rowFor(sr,mon) { const o=weekOff(mon); return((sr-1+o)%15+15)%15; }
function fmtD(d) { return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0"); }

function chipCls(t,u) {
  if(!t||t==="L"||t==="/"||t==="MT"||t==="TN") return "neu";
  return u||"neu";
}

function chipHtml(t,u,ri,di) {
  const cls = chipCls(t,u);
  const lbl = t==="MT"?"M/T":t==="TN"?"T/N":(t||"·");
  const sz = (t==="MT"||t==="TN")?".55rem":".72rem";
  const today = new Date(); const isToday = false;
  return `<div class="chip ${cls}" style="font-size:${sz}" onclick="openEdit(${ri},${di})">${lbl}</div>`;
}

function render() {
  document.getElementById("yearLabel").textContent = currentYear;
  const today = new Date();

  // Build list of (year,month) pairs
  const months = [];
  for(let m=0;m<12;m++) months.push([currentYear,m]);

  // Count days total
  let headHTML = '<tr><th class="name-col">Persona</th>';
  let prevMonth = -1;
  const dayCols = []; // {year,month,day,dow,isSun,isToday}

  months.forEach(([yr,mn]) => {
    const last = new Date(yr,mn+1,0).getDate();
    for(let d=1;d<=last;d++) {
      const date = new Date(yr,mn,d);
      const dow = (date.getDay()+6)%7;
      const isSun = dow===6;
      const isToday2 = date.toDateString()===today.toDateString();
      dayCols.push({yr,mn,d,dow,isSun,isToday:isToday2});
    }
  });

  // Month header row
  let headRow1 = '<tr><th class="name-col" rowspan="2"></th>';
  let mSpan = 0; let mName = "";
  dayCols.forEach((dc,i) => {
    if(dc.mn !== (i>0?dayCols[i-1].mn:-1)) {
      if(mSpan>0) headRow1 += `<th class="month-hdr" colspan="${mSpan}">${mName}</th>`;
      mSpan=0; mName=MONTHS_ES[dc.mn];
    }
    mSpan++;
    if(i===dayCols.length-1) headRow1+=`<th class="month-hdr" colspan="${mSpan}">${mName}</th>`;
  });
  headRow1 += '</tr>';

  // Day numbers row
  let headRow2 = '<tr>';
  dayCols.forEach(dc => {
    const we = dc.dow>=5;
    headRow2 += `<th class="${dc.isSun?"sun":""} ${we?"we":""}" style="${dc.isToday?"background:#c8e6c9;color:#1a7a40;font-weight:700":""}">${dc.d}<br><span style="font-size:.58rem">${DAYS_ES[dc.dow]}</span></th>`;
  });
  headRow2 += '</tr>';

  document.getElementById("thead").innerHTML = headRow1 + headRow2;

  // Body
  let bodyHTML = '';
  PEOPLE.forEach((p,pi) => {
    const bg = pi%2===0?"#ffffff":"#f8f9fa";
    bodyHTML += `<tr><td class="name-col" style="background:${bg}">${p.name}</td>`;
    dayCols.forEach(dc => {
      const mon = mondayOf(new Date(dc.yr,dc.mn,dc.d));
      const ri = rowFor(p.startRow,mon);
      const cell = ROTA[ri][dc.dow];
      const t=cell?cell[0]:null, u=cell?cell[1]:null;
      const cellBg = dc.isToday?"#c8e6c9":dc.isSun?"#f0ecf8":bg;
      bodyHTML += `<td style="background:${cellBg}">${chipHtml(t,u,ri,dc.dow)}</td>`;
    });
    bodyHTML += '</tr>';
  });
  document.getElementById("tbody").innerHTML = bodyHTML;

  // Set column widths
  const tbl = document.getElementById("tbl");
  tbl.style.minWidth = (90 + dayCols.length*32)+"px";
}

function changeYear(d) { currentYear+=d; render(); }

function goToToday() {
  currentYear = new Date().getFullYear();
  render();
  setTimeout(() => {
    const wrap = document.getElementById("wrap");
    const today = new Date();
    let offset = 90;
    let d2 = new Date(currentYear,0,1);
    while(d2 <= today) {
      if(d2.toDateString()!==today.toDateString()) offset+=32;
      else break;
      d2.setDate(d2.getDate()+1);
    }
    wrap.scrollLeft = offset - wrap.clientWidth/2;
  },100);
}

// ── MODAL ──
const UNITS = [["I","🔴 Ictus"],["V","🟢 351-353"],["N2","⚫ 354/337-339"],["A","🔵 340-345"]];
const TURNS = [["M","☀️ M"],["T","🌤 T"],["N","🌙 N"],["MT","☀️🌤 M/T"],["TN","🌤🌙 T/N"],["L","✅ L"],["/","/ Sal"]];

function openEdit(ri,di) {
  editCtx={ri,di};
  const cell=ROTA[ri][di];
  editTurn=cell?cell[0]:null;
  editUnit=cell?cell[1]:null;
  editUnit2=cell?cell[2]:null;
  document.getElementById("mTitle").textContent=`Fila ${ri+1} · ${DAYS_ES[di]}`;
  document.getElementById("mSub").textContent=cell?`Actual: ${cell[0]}${cell[1]?" — "+UNIT_LABELS[cell[1]]:""}`:""
  renderTurnBtns(); renderUnitBtns();
  document.getElementById("overlay").classList.add("open");
}

function renderTurnBtns() {
  document.getElementById("turnRow").innerHTML=TURNS.map(([k,l])=>
    `<div class="tbtn ${editTurn===k?"active":""}" onclick="selTurn('${k}')">${l}</div>`).join("");
}

function renderUnitBtns() {
  const isDouble=editTurn==="MT"||editTurn==="TN";
  const show=editTurn&&editTurn!=="L"&&editTurn!=="/";
  document.getElementById("unitSection").style.display=show?"":"none";
  if(!show) return;
  const lbl1=isDouble?(editTurn==="MT"?"☀️ Turno mañana:":"🌤 Turno tarde:"):"Unidad:";
  const lbl2=isDouble?(editTurn==="MT"?"🌤 Turno tarde:":"🌙 Turno noche:"):"";
  document.getElementById("unitLabel1").textContent=lbl1;
  document.getElementById("unitGrid1").innerHTML=UNITS.map(([k,l])=>
    `<div class="ubtn ${k} ${editUnit===k?"active":""}" onclick="selUnit1('${k}')">${l}</div>`).join("");
  document.getElementById("unitLabel2").style.display=isDouble?"":"none";
  document.getElementById("unitGrid2").style.display=isDouble?"grid":"none";
  if(isDouble) document.getElementById("unitGrid2").innerHTML=UNITS.map(([k,l])=>
    `<div class="ubtn ${k} ${editUnit2===k?"active":""}" onclick="selUnit2('${k}')">${l}</div>`).join("");
}

function selTurn(t) { editTurn=t; if(t==="L"||t==="/") {editUnit=null;editUnit2=null;} renderTurnBtns(); renderUnitBtns(); }
function selUnit1(u) { editUnit=u; renderUnitBtns(); }
function selUnit2(u) { editUnit2=u; renderUnitBtns(); }
function confirmEdit() { applyEdit(editTurn,editUnit,editUnit2); }

function applyEdit(t,u,u2) {
  if(!editCtx) return;
  const val = t?[t,u||null,u2||null]:null;
  ROTA[editCtx.ri][editCtx.di] = val;
  if(db) db.ref("rota_changes/"+editCtx.ri+"_"+editCtx.di).set(val).catch(()=>{});
  closeModal(); render();
}

function closeModal() { document.getElementById("overlay").classList.remove("open"); editCtx=null; }
function outsideClose(e) { if(e.target.id==="overlay") closeModal(); }

window.onload = function() { render(); setTimeout(goToToday,200); };
</script>
</body>
</html>
